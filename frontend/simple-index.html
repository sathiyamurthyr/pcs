<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pooja Catering Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-md p-4">
        <div class="container mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-green-800">🌿 Pooja Catering Service & Wedding Associates</h1>
                <p class="text-sm text-amber-600">ISO 9001-2015 Certified | Since 1995</p>
            </div>
            <div class="space-x-4">
                <a href="#" class="text-gray-600 hover:text-green-700">Home</a>
                <a href="#" class="text-gray-600 hover:text-green-700">About</a>
                <a href="#" class="text-gray-600 hover:text-green-700">Services</a>
                <a href="#" class="text-gray-600 hover:text-green-700">Gallery</a>
                <button onclick="showAdminModal()" class="bg-green-700 text-white px-4 py-2 rounded-lg">Admin Panel</button>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="bg-gradient-to-r from-green-900 to-green-700 text-white py-20 text-center">
        <h1 class="text-5xl font-bold mb-4">Authentic & Pure Vegetarian Catering</h1>
        <p class="text-xl">ISO Certified Catering | Astrology | Wedding Planning | Constructions | Matrimony | Temple Sevaigal</p>
    </section>

    <!-- Admin Modal -->
    <div id="adminModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000;">
        <div style="background:white; max-width:400px; margin:100px auto; padding:30px; border-radius:10px;">
            <span onclick="closeAdminModal()" style="float:right; cursor:pointer;">&times;</span>
            <h2 class="text-2xl font-bold mb-4">Admin Login</h2>
            <form onsubmit="return handleAdminLogin(event)">
                <input type="text" id="adminUsername" placeholder="Username" class="w-full p-2 mb-3 border rounded" required>
                <input type="password" id="adminPassword" placeholder="Password" class="w-full p-2 mb-3 border rounded" required>
                <button type="submit" class="w-full bg-green-700 text-white p-2 rounded">Login</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        
        function showAdminModal() {
            document.getElementById('adminModal').style.display = 'block';
        }
        
        function closeAdminModal() {
            document.getElementById('adminModal').style.display = 'none';
        }
        
        async function handleAdminLogin(event) {
            event.preventDefault();
            const username = document.getElementById('adminUsername').value;
            const password = document.getElementById('adminPassword').value;
            
            try {
                const response = await fetch(`${API_URL}/auth/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('adminToken', data.token);
                    localStorage.setItem('adminUser', JSON.stringify(data.admin));
                    window.location.href = 'admin/admin_dashboard.html';
                } else {
                    alert('Login failed: ' + data.message);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
            return false;
        }
        
        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('adminModal');
            if (event.target === modal) closeAdminModal();
        }
    </script>
</body>
</html>
