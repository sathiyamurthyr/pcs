<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Manager | Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .category-tab {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .category-tab.active {
            background: #2c5f2d;
            color: white;
        }
        .image-card {
            transition: all 0.3s ease;
        }
        .image-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        .toast-message {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .preview-img {
            max-width: 100px;
            max-height: 100px;
            margin-top: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body class="bg-gray-100">
    <div class="p-6">
        <div class="mb-6">
            <h2 class="text-2xl font-bold text-gray-800">Gallery Manager</h2>
            <p class="text-gray-600">Upload, manage and delete images for all service categories</p>
        </div>

        <!-- Category Tabs -->
        <div class="flex flex-wrap gap-2 mb-6 border-b pb-3">
            <button onclick="showCategory('all')" id="tab-all" class="category-tab px-4 py-2 rounded-lg bg-gray-200 hover:bg-gray-300 transition">
                <i class="fas fa-images"></i> All Images
            </button>
            <button onclick="showCategory('catering')" id="tab-catering" class="category-tab px-4 py-2 rounded-lg bg-gray-200 hover:bg-gray-300 transition">
                <i class="fas fa-utensils"></i> Catering
            </button>
            <button onclick="showCategory('astrology')" id="tab-astrology" class="category-tab px-4 py-2 rounded-lg bg-gray-200 hover:bg-gray-300 transition">
                <i class="fas fa-star-and-crescent"></i> Astrology
            </button>
            <button onclick="showCategory('wedding')" id="tab-wedding" class="category-tab px-4 py-2 rounded-lg bg-gray-200 hover:bg-gray-300 transition">
                <i class="fas fa-ring"></i> Wedding
            </button>
            <button onclick="showCategory('matrimony')" id="tab-matrimony" class="category-tab px-4 py-2 rounded-lg bg-gray-200 hover:bg-gray-300 transition">
                <i class="fas fa-heart"></i> Matrimony
            </button>
            <button onclick="showCategory('temple')" id="tab-temple" class="category-tab px-4 py-2 rounded-lg bg-gray-200 hover:bg-gray-300 transition">
                <i class="fas fa-temple"></i> Temple
            </button>
            <button onclick="showCategory('construction')" id="tab-construction" class="category-tab px-4 py-2 rounded-lg bg-gray-200 hover:bg-gray-300 transition">
                <i class="fas fa-building"></i> Construction
            </button>
        </div>

        <!-- Upload Form -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <h3 class="font-bold text-lg mb-4"><i class="fas fa-cloud-upload-alt text-green-600"></i> Upload New Image</h3>
            <form id="uploadForm" enctype="multipart/form-data" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold mb-1">Category *</label>
                    <select id="uploadCategory" required class="w-full px-3 py-2 border rounded-lg">
                        <option value="">Select Category</option>
                        <option value="catering">🍛 Catering Service</option>
                        <option value="astrology">🔮 Astrology Service</option>
                        <option value="wedding">💒 Wedding Events</option>
                        <option value="matrimony">💑 Matrimony Service</option>
                        <option value="temple">🛕 Temple Services</option>
                        <option value="construction">🏗️ Constructions</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">Image File *</label>
                    <input type="file" id="uploadImage" accept="image/*" required class="w-full px-3 py-2 border rounded-lg" onchange="previewImage(this)">
                    <img id="imagePreview" class="preview-img hidden" alt="Preview">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">Title (Optional)</label>
                    <input type="text" id="uploadTitle" placeholder="Image title" class="w-full px-3 py-2 border rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">Description (Optional)</label>
                    <input type="text" id="uploadDesc" placeholder="Short description" class="w-full px-3 py-2 border rounded-lg">
                </div>
                <div class="md:col-span-2">
                    <button type="submit" class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 transition">
                        <i class="fas fa-upload"></i> Upload Image
                    </button>
                </div>
            </form>
        </div>

        <!-- Gallery Grid -->
        <div id="galleryGrid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4">
            <div class="text-center py-10 col-span-full">Loading images...</div>
        </div>
    </div>

    <div id="toast" class="toast-message hidden bg-green-600 text-white px-5 py-3 rounded-lg shadow-lg"></div>

    <script>
        // Use relative URL so it works on any domain
        const API_URL = window.location.origin + '/api';
        let token = localStorage.getItem('adminToken');
        let currentCategory = 'all';

        // Check authentication
        if (!token) {
            window.location.href = '../index.html';
        }

        function previewImage(input) {
            const preview = document.getElementById('imagePreview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.classList.remove('hidden');
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.className = `toast-message ${type === 'success' ? 'bg-green-600' : 'bg-red-600'} text-white px-5 py-3 rounded-lg shadow-lg`;
            toast.innerHTML = `<i class="fa-regular fa-${type === 'success' ? 'circle-check' : 'circle-exclamation'}"></i> ${message}`;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 4000);
        }

        function updateActiveTab(category) {
            document.querySelectorAll('.category-tab').forEach(tab => {
                tab.classList.remove('active', 'bg-green-600', 'text-white');
                tab.classList.add('bg-gray-200');
            });
            const activeTab = document.getElementById(`tab-${category === 'all' ? 'all' : category}`);
            if (activeTab) {
                activeTab.classList.remove('bg-gray-200');
                activeTab.classList.add('active', 'bg-green-600', 'text-white');
            }
        }

        async function showCategory(category) {
            currentCategory = category;
            updateActiveTab(category);
            
            try {
                let url = `${API_URL}/gallery/all`;
                if (category !== 'all') {
                    url = `${API_URL}/gallery/category/${category}`;
                }
                
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.success) {
                    displayImages(data.images);
                } else {
                    showToast('Failed to load images', 'error');
                }
            } catch (error) {
                console.error('Error loading images:', error);
                showToast('Error loading images', 'error');
            }
        }

        function getCategoryIcon(category) {
            const icons = {
                'catering': '🍛',
                'astrology': '🔮',
                'wedding': '💒',
                'matrimony': '💑',
                'temple': '🛕',
                'construction': '🏗️'
            };
            return icons[category] || '📷';
        }

        function displayImages(images) {
            const grid = document.getElementById('galleryGrid');
            
            if (!images || images.length === 0) {
                grid.innerHTML = `
                    <div class="text-center py-10 col-span-full bg-white rounded-lg shadow">
                        <i class="fas fa-images text-5xl text-gray-300 mb-3"></i>
                        <p class="text-gray-500">No images found in this category</p>
                        <p class="text-sm text-gray-400">Upload images using the form above</p>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = images.map(img => `
                <div class="image-card bg-white rounded-lg shadow-md overflow-hidden">
                    <img src="${img.image_url}" alt="${img.title || 'Gallery Image'}" class="w-full h-48 object-cover" onerror="this.src='https://via.placeholder.com/300?text=No+Image'">
                    <div class="p-3">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-xs px-2 py-0.5 rounded-full bg-green-100 text-green-700">
                                ${getCategoryIcon(img.category)} ${img.category}
                            </span>
                        </div>
                        <h4 class="font-bold text-gray-800 truncate">${img.title || 'Untitled'}</h4>
                        <p class="text-xs text-gray-500 truncate">${img.description || 'No description'}</p>
                        <div class="flex justify-between items-center mt-2">
                            <span class="text-xs text-gray-400">
                                <i class="fas fa-calendar"></i> ${new Date(img.uploaded_at).toLocaleDateString()}
                            </span>
                            <button onclick="deleteImage(${img.id})" class="bg-red-600 text-white px-3 py-1 rounded text-sm hover:bg-red-700">
                                <i class="fas fa-trash"></i> Delete
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function deleteImage(id) {
            if (confirm('Are you sure you want to delete this image permanently?')) {
                try {
                    const response = await fetch(`${API_URL}/gallery/${id}`, {
                        method: 'DELETE',
                        headers: { 
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        }
                    });
                    const data = await response.json();
                    if (data.success) {
                        showToast('Image deleted successfully', 'success');
                        showCategory(currentCategory);
                    } else {
                        showToast('Failed to delete image: ' + (data.message || 'Unknown error'), 'error');
                    }
                } catch (error) {
                    console.error('Delete error:', error);
                    showToast('Error deleting image', 'error');
                }
            }
        }

        // Handle image upload
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const category = document.getElementById('uploadCategory').value;
            const imageFile = document.getElementById('uploadImage').files[0];
            const title = document.getElementById('uploadTitle').value;
            const description = document.getElementById('uploadDesc').value;
            
            if (!category || !imageFile) {
                showToast('Please select category and image file', 'error');
                return;
            }
            
            const formData = new FormData();
            formData.append('category', category);
            formData.append('image', imageFile);
            formData.append('title', title);
            formData.append('description', description);
            
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading...';
            btn.disabled = true;
            
            try {
                const response = await fetch(`${API_URL}/gallery/upload`, {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${token}`
                    },
                    body: formData
                });
                
                if (response.status === 403) {
                    showToast('Session expired. Please login again.', 'error');
                    setTimeout(() => {
                        localStorage.removeItem('adminToken');
                        localStorage.removeItem('adminUser');
                        window.location.href = '../index.html';
                    }, 2000);
                    return;
                }
                
                const data = await response.json();
                
                if (data.success) {
                    showToast(`✅ Image uploaded successfully to ${category} folder!`, 'success');
                    document.getElementById('uploadForm').reset();
                    document.getElementById('imagePreview').classList.add('hidden');
                    showCategory(currentCategory);
                } else {
                    showToast(data.message || 'Upload failed', 'error');
                }
            } catch (error) {
                console.error('Upload error:', error);
                showToast('Error uploading image: ' + error.message, 'error');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

        // Load initial images
        showCategory('all');
    </script>
</body>
</html>
