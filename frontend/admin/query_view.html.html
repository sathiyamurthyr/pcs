<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Query View</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f3f4f6; font-family: 'Inter', sans-serif; }
        .query-card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 15px; border-left: 4px solid #bfa15f; transition: all 0.3s; }
        .query-card:hover { transform: translateX(5px); box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        .delete-query { background: #ef4444; color: white; padding: 5px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.75rem; }
        .delete-query:hover { background: #dc2626; }
    </style>
</head>
<body class="p-6">
    <div id="queriesContent"></div>

    <script>
        function loadQueries() {
            const queries = JSON.parse(localStorage.getItem('poojaQueries') || '[]');
            
            const html = `
                <div class="bg-white rounded-2xl p-6 shadow-md">
                    <h3 class="font-bold text-xl mb-4 flex items-center gap-2"><i class="fa-solid fa-envelope text-blue-500"></i> Customer Enquiries (${queries.length})</h3>
                    ${queries.length === 0 ? '<p class="text-gray-500 text-center py-10">No enquiries received yet</p>' : queries.map((q, index) => `
                        <div class="query-card">
                            <div class="flex justify-between items-start flex-wrap gap-3">
                                <div class="flex-1">
                                    <p class="font-bold text-lg">${q.name}</p>
                                    <p class="text-sm text-gray-600"><i class="fa-solid fa-phone"></i> ${q.mobile}</p>
                                    <p class="text-sm text-gray-600"><i class="fa-regular fa-envelope"></i> ${q.email || 'N/A'}</p>
                                    <p class="text-sm mt-2"><span class="font-semibold">Service:</span> ${q.service}</p>
                                    <p class="text-sm mt-1"><span class="font-semibold">Message:</span> ${q.message}</p>
                                    <p class="text-xs text-gray-400 mt-2"><i class="fa-regular fa-clock"></i> ${new Date(q.date).toLocaleString()}</p>
                                </div>
                                <button onclick="deleteQuery(${index})" class="delete-query"><i class="fa-regular fa-trash-alt"></i> Delete</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            document.getElementById('queriesContent').innerHTML = html;
        }
        
        function deleteQuery(index) {
            if (confirm('Delete this enquiry?')) {
                let queries = JSON.parse(localStorage.getItem('poojaQueries') || '[]');
                queries.splice(index, 1);
                localStorage.setItem('poojaQueries', JSON.stringify(queries));
                loadQueries();
            }
        }
        
        loadQueries();
        window.addEventListener('storage', function() { loadQueries(); });
    </script>
</body>
</html>
