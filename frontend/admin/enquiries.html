<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>General Enquiries | Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
<base target="_blank">
<base target="_blank">
</head>
<body class="bg-gray-100">
<!-- Admin Sidebar -->
<div class="sidebar" style="position: fixed; left: 0; top: 0; height: 100%; width: 280px; background: linear-gradient(180deg, #1a331e 0%, #2c5f2d 100%); color: white; z-index: 100; box-shadow: 2px 0 10px rgba(0,0,0,0.1);">
    <div style="padding: 25px 20px; border-bottom: 1px solid rgba(255,255,255,0.2); text-align: center;">
        <i class="fa-solid fa-leaf text-3xl" style="color: #bfa15f;"></i>
        <h2 style="font-family: 'Playfair Display', serif; font-size: 1.3rem; margin-top: 10px; color: white;">Pooja Admin</h2>
        <p class="text-xs text-gray-300 mt-1">Admin</p>
    </div>
    <div style="padding: 20px 0;">
        <div class="nav-item" data-page="admin_dashboard" onclick="goToPage('admin_dashboard')" style="padding: 12px 25px; margin: 5px 10px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; font-size: 0.95rem; transition: all 0.3s;">
            <i class="fa-solid fa-chart-line" style="width: 24px; font-size: 1.2rem;"></i> <span>Dashboard</span>
        </div>
        <div class="nav-item" data-page="gallery" onclick="goToPage('gallery')" style="padding: 12px 25px; margin: 5px 10px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; font-size: 0.95rem; transition: all 0.3s;">
            <i class="fa-solid fa-images" style="width: 24px; font-size: 1.2rem;"></i> <span>Gallery Manager</span>
        </div>
        <div class="nav-item" data-page="customer_request" onclick="goToPage('customer_request')" style="padding: 12px 25px; margin: 5px 10px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; font-size: 0.95rem; transition: all 0.3s;">
            <i class="fa-solid fa-clipboard-list" style="width: 24px; font-size: 1.2rem;"></i> <span>Member Requests</span>
        </div>
        <div class="nav-item" data-page="users" onclick="goToPage('users')" style="padding: 12px 25px; margin: 5px 10px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; font-size: 0.95rem; transition: all 0.3s;">
            <i class="fa-solid fa-users" style="width: 24px; font-size: 1.2rem;"></i> <span>User Approval</span>
        </div>
        <div class="nav-item active" data-page="enquiries" onclick="goToPage('enquiries')" style="padding: 12px 25px; margin: 5px 10px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; font-size: 0.95rem; transition: all 0.3s; background: #bfa15f; color: #1a331e;">
            <i class="fa-solid fa-headset" style="width: 24px; font-size: 1.2rem;"></i> <span>General Enquiries</span>
        </div>
        <div class="nav-item" data-page="appointments" onclick="goToPage('appointments')" style="padding: 12px 25px; margin: 5px 10px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; font-size: 0.95rem; transition: all 0.3s;">
            <i class="fa-solid fa-calendar-check" style="width: 24px; font-size: 1.2rem;"></i> <span>Appointments</span>
        </div>
    </div>
</div>

<!-- Main Content Wrapper -->
<div style="margin-left: 280px; min-height: 100vh; background: #f3f4f6;">
    <!-- Top Bar -->
    <div style="background: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 10;">
        <div style="font-size: 1.5rem; font-weight: 700; color: #1a331e;">General Enquiries</div>
        <div style="display: flex; align-items: center; gap: 15px;">
            <span style="background: #e5e7eb; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem;"><i class="fa-regular fa-user"></i> <span id="topAdminUsername">admin</span></span>
            <button onclick="goHome()" style="background: #6b7280; color: white; padding: 8px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: 500;"><i class="fa-solid fa-home"></i> Back to Home</button>
            <button onclick="logout()" style="background: #dc2626; color: white; padding: 8px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: 500;"><i class="fa-solid fa-sign-out-alt"></i> Logout</button>
        </div>
    </div>

    <!-- Page Content -->
    <div style="padding: 20px;">

    <div class="p-6">
        <div class="mb-6">
            <h2 class="text-2xl font-bold text-gray-800">General Enquiries</h2>
            <p class="text-gray-600">Manage enquiries from non-registered users</p>
        </div>

        <!-- Filter Section -->
        <div class="bg-white rounded-lg shadow-md p-4 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-sm font-semibold mb-1">From Date</label>
                    <input type="date" id="fromDate" class="w-full px-3 py-2 border rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">To Date</label>
                    <input type="date" id="toDate" class="w-full px-3 py-2 border rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">Status</label>
                    <select id="statusFilter" class="w-full px-3 py-2 border rounded-lg">
                        <option value="all">All</option>
                        <option value="new">New</option>
                        <option value="read">Read</option>
                        <option value="replied">Replied</option>
                    </select>
                </div>
                <div class="flex items-end">
                    <button onclick="filterEnquiries()" class="bg-green-600 text-white px-4 py-2 rounded-lg w-full">
                        <i class="fas fa-search"></i> Filter
                    </button>
                </div>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6" id="statsContainer">
            <div class="bg-white rounded-lg shadow-md p-4 text-center">
                <div class="text-2xl font-bold text-blue-600" id="totalCount">0</div>
                <div class="text-gray-600">Total Enquiries</div>
            </div>
            <div class="bg-white rounded-lg shadow-md p-4 text-center">
                <div class="text-2xl font-bold text-yellow-600" id="newCount">0</div>
                <div class="text-gray-600">New Enquiries</div>
            </div>
            <div class="bg-white rounded-lg shadow-md p-4 text-center">
                <div class="text-2xl font-bold text-green-600" id="todayCount">0</div>
                <div class="text-gray-600">Today's Enquiries</div>
            </div>
        </div>

        <!-- Enquiries List -->
        <div id="enquiriesContainer" class="space-y-4"></div>
    </div>

    <div id="toast" class="fixed bottom-4 right-4 hidden bg-gray-800 text-white px-4 py-2 rounded-lg shadow-lg z-50"></div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        const token = localStorage.getItem('adminToken');

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.className = `fixed bottom-4 right-4 px-4 py-2 rounded-lg shadow-lg z-50 ${type === 'success' ? 'bg-green-600' : 'bg-red-600'} text-white`;
            toast.innerHTML = message;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        async function loadStats() {
            try {
                const response = await fetch(`${API_URL}/enquiries/stats/summary`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('totalCount').innerText = data.stats.total;
                    document.getElementById('newCount').innerText = data.stats.new;
                    document.getElementById('todayCount').innerText = data.stats.today;
                }
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        async function filterEnquiries() {
            const fromDate = document.getElementById('fromDate').value;
            const toDate = document.getElementById('toDate').value;
            const status = document.getElementById('statusFilter').value;
            
            let url = `${API_URL}/enquiries/all`;
            let params = [];
            
            if (fromDate && toDate) {
                params.push(`from_date=${fromDate}&to_date=${toDate}`);
            }
            
            if (params.length > 0) {
                url += `?${params.join('&')}`;
            }
            
            try {
                const response = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    let enquiries = data.enquiries;
                    
                    // Filter by status if not "all"
                    if (status !== 'all') {
                        enquiries = enquiries.filter(e => e.status === status);
                    }
                    
                    displayEnquiries(enquiries);
                }
            } catch (error) {
                console.error('Error loading enquiries:', error);
                showToast('Error loading enquiries', 'error');
            }
        }

        function displayEnquiries(enquiries) {
            const container = document.getElementById('enquiriesContainer');
            
            if (enquiries.length === 0) {
                container.innerHTML = `
                    <div class="bg-white rounded-lg shadow-md p-8 text-center text-gray-500">
                        <i class="fas fa-inbox text-4xl mb-2"></i>
                        <p>No enquiries found</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = enquiries.map(enquiry => `
                <div class="bg-white rounded-lg shadow-md p-5 border-l-4 ${enquiry.status === 'new' ? 'border-yellow-500' : enquiry.status === 'read' ? 'border-blue-500' : 'border-green-500'}">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <div class="flex items-center gap-3 mb-2">
                                <h3 class="text-lg font-bold text-gray-800">${enquiry.name}</h3>
                                <span class="text-xs px-2 py-1 rounded-full ${enquiry.status === 'new' ? 'bg-yellow-100 text-yellow-700' : enquiry.status === 'read' ? 'bg-blue-100 text-blue-700' : 'bg-green-100 text-green-700'}">
                                    ${enquiry.status.toUpperCase()}
                                </span>
                            </div>
                            <div class="grid grid-cols-2 gap-2 text-sm mb-3">
                                <p><i class="fas fa-phone text-green-600"></i> <strong>Phone:</strong> ${enquiry.phone}</p>
                                <p><i class="fas fa-envelope text-blue-600"></i> <strong>Email:</strong> ${enquiry.email || 'Not provided'}</p>
                                <p><i class="fas fa-tag text-purple-600"></i> <strong>Service:</strong> ${enquiry.service_interest || 'General'}</p>
                                <p><i class="fas fa-calendar text-gray-600"></i> <strong>Received:</strong> ${new Date(enquiry.created_at).toLocaleString()}</p>
                            </div>
                            <div class="bg-gray-50 p-3 rounded-lg">
                                <strong class="text-sm">Message:</strong>
                                <p class="text-gray-700 text-sm mt-1">${enquiry.message}</p>
                            </div>
                        </div>
                        <div class="flex gap-2 ml-4">
                            ${enquiry.status === 'new' ? `<button onclick="markAsRead(${enquiry.id})" class="bg-blue-600 text-white px-3 py-1 rounded text-sm hover:bg-blue-700">
                                <i class="fas fa-check"></i> Mark Read
                            </button>` : ''}
                            ${enquiry.status === 'read' ? `<button onclick="markAsReplied(${enquiry.id})" class="bg-green-600 text-white px-3 py-1 rounded text-sm hover:bg-green-700">
                                <i class="fas fa-reply"></i> Mark Replied
                            </button>` : ''}
                            <button onclick="deleteEnquiry(${enquiry.id})" class="bg-red-600 text-white px-3 py-1 rounded text-sm hover:bg-red-700">
                                <i class="fas fa-trash"></i> Delete
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function markAsRead(id) {
            try {
                const response = await fetch(`${API_URL}/enquiries/${id}/read`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                if (data.success) {
                    showToast('Enquiry marked as read', 'success');
                    filterEnquiries();
                    loadStats();
                }
            } catch (error) {
                showToast('Error updating status', 'error');
            }
        }

        async function markAsReplied(id) {
            try {
                const response = await fetch(`${API_URL}/enquiries/${id}/replied`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                if (data.success) {
                    showToast('Enquiry marked as replied', 'success');
                    filterEnquiries();
                    loadStats();
                }
            } catch (error) {
                showToast('Error updating status', 'error');
            }
        }

        async function deleteEnquiry(id) {
            if (confirm('Are you sure you want to delete this enquiry?')) {
                try {
                    const response = await fetch(`${API_URL}/enquiries/${id}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const data = await response.json();
                    if (data.success) {
                        showToast('Enquiry deleted successfully', 'success');
                        filterEnquiries();
                        loadStats();
                    }
                } catch (error) {
                    showToast('Error deleting enquiry', 'error');
                }
            }
        }

        // Update Admin Dashboard Sidebar - Add General Enquiry link
        function updateSidebar() {
            // This function will be called from parent to update the sidebar
            console.log('Enquiries page loaded');
        }

        // Load initial data
        loadStats();
        filterEnquiries();
    </script>
    </div>
</div>
    <script>
        function goToPage(page) {
            localStorage.setItem('adminCurrentPage', page);
            window.location.href = page + '.html';
        }
        function goHome() {
            window.location.replace('../index.html');
        }
        function logout() {
            localStorage.removeItem('adminLoggedIn');
            localStorage.removeItem('adminUsername');
            localStorage.removeItem('adminToken');
            localStorage.removeItem('adminUser');
            localStorage.removeItem('adminCurrentPage');
            window.location.replace('../index.html');
        }
        // Check auth
        (function() {
            const isLoggedIn = localStorage.getItem('adminLoggedIn');
            if (!isLoggedIn || isLoggedIn !== 'true') {
                window.location.replace('../index.html');
            }
            const username = localStorage.getItem('adminUsername') || 'Admin';
            const topAdminUsernameEl = document.getElementById('topAdminUsername');
            if (topAdminUsernameEl) topAdminUsernameEl.innerText = username;
        })();
    </script>

</body>
</html>
