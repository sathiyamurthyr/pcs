<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Construction Projects | Pooja Catering</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandGreen: '#2c5f2d',
                        brandGreenLight: '#3d7a3e',
                        brandGreenDark: '#1a331e',
                        brandGold: '#bfa15f',
                        brandSoft: '#fffaf0',
                        brandGreen50: '#f0f7f0',
                        brandGreen100: '#d4e8d4',
                        brandGreen200: '#a8d5a8',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif']
                    }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f7f5; padding: 16px; }
        .standalone-content { max-width: 900px; margin: 0 auto; }

        .hero-section {
            background: linear-gradient(135deg, #2c5f2d, #1a331e);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            margin-bottom: 32px;
            color: white;
            position: relative;
            overflow: hidden;
        }
        .hero-section::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        .hero-section h2 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }
        .hero-section p {
            opacity: 0.85;
            font-size: 15px;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.7;
            position: relative;
            z-index: 1;
        }
        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.15);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 16px;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(4px);
        }

        .form-section {
            background: white;
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            border: 1px solid #eef2ee;
            margin-bottom: 24px;
        }
        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid #f0f7f0;
        }
        .section-header h3 {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 700;
            color: #1a331e;
        }
        .section-header-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, #2c5f2d, #1a331e);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        .form-grid-3 {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 20px;
        }
        .form-group { margin-bottom: 4px; }
        .form-group.full-width { grid-column: span 2; }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #1a331e;
            margin-bottom: 8px;
        }
        .form-group label .required { color: #dc2626; margin-left: 2px; }
        .sub-label {
            font-size: 11px;
            color: #888;
            margin-top: 4px;
        }
        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e8ede8;
            border-radius: 12px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            color: #333;
            transition: all 0.3s ease;
            background: #fafbfa;
        }
        .form-control:focus {
            outline: none;
            border-color: #2c5f2d;
            background: white;
            box-shadow: 0 0 0 4px rgba(44,95,45,0.08);
        }
        .form-control::placeholder { color: #bbb; }
        textarea.form-control { resize: vertical; min-height: 120px; }

        .btn-primary {
            background: linear-gradient(135deg, #2c5f2d, #1a331e);
            color: white;
            padding: 16px 32px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            border: none;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(44,95,45,0.2);
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(44,95,45,0.3); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .toast {
            position: fixed; bottom: 24px; right: 24px;
            background: white; border-left: 4px solid #2c5f2d;
            padding: 16px 24px; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex; align-items: center; gap: 12px;
            transform: translateY(100px); opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2000; pointer-events: none;
        }
        .toast.show { transform: translateY(0); opacity: 1; pointer-events: auto; }
        .toast.error { border-left-color: #dc2626; }

        .projects-list {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            border: 1px solid #eef2ee;
        }
        .project-card {
            border: 1px solid #e8ede8;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            transition: all 0.3s ease;
        }
        .project-card:hover {
            border-color: #2c5f2d;
            box-shadow: 0 4px 12px rgba(44,95,45,0.08);
        }
        .project-card h4 {
            font-family: 'Playfair Display', serif;
            color: #1a331e;
            margin-bottom: 4px;
        }
        .req-id-badge {
            display: inline-block;
            background: #2c5f2d;
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }
        .status-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-in_review { background: #dbeafe; color: #1e40af; }
        .status-approved { background: #d1fae5; color: #065f46; }
        .status-in_progress { background: #e0e7ff; color: #3730a3; }
        .status-completed { background: #d1fae5; color: #065f46; }
        .status-cancelled { background: #fee2e2; color: #991b1b; }

        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .loading-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #d4e8d4;
            border-top-color: #2c5f2d;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .form-grid, .form-grid-3 { grid-template-columns: 1fr; }
            .form-group.full-width { grid-column: span 1; }
            .hero-section { padding: 30px 20px; }
            body { padding: 12px; }
        }
    </style>
<base target="_blank">
</head>
<body>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <main class="standalone-content">
        <!-- My Projects List -->
        <div id="myProjectsSection" class="projects-list" style="display: none;">
            <div class="section-header" style="border-bottom: none; padding-bottom: 0; margin-bottom: 16px;">
                <div class="section-header-icon"><i class="fa-solid fa-hard-hat"></i></div>
                <h3>My Construction Projects</h3>
            </div>
            <div id="projectsList"></div>
        </div>

        <header class="hero-section">
            <div class="hero-badge">
                <i class="fa-solid fa-building"></i> Construction Services
            </div>
            <h2 id="formTitle">Construction Project Intake</h2>
            <p>Please provide the details of your construction project below.</p>
        </header>

        <form id="constructionForm" onsubmit="handleFormSubmit(event)">
            <input type="hidden" id="editReqId" value="">

            <fieldset class="form-section">
                <div class="section-header">
                    <div class="section-header-icon"><i class="fa-solid fa-clipboard-list"></i></div>
                    <h3>Project Overview</h3>
                </div>

                <div class="form-group full-width">
                    <label>Project Name <span class="required">*</span></label>
                    <input type="text" name="project_name" class="form-control" placeholder="e.g., Downtown Office Renovation" required>
                </div>

                <div class="form-group full-width">
                    <label>Project Location <span class="required">*</span></label>
                    <input type="text" name="address_line1" class="form-control" placeholder="Street Address" style="margin-bottom: 10px;" required>
                    <input type="text" name="address_line2" class="form-control" placeholder="Street Address Line 2" style="margin-bottom: 10px;">

                    <div class="form-grid-3">
                        <div>
                            <input type="text" name="city" class="form-control" placeholder="City" required>
                        </div>
                        <div>
                            <input type="text" name="state_province" class="form-control" placeholder="State / Province" required>
                        </div>
                        <div>
                            <input type="text" name="postal_zip" class="form-control" placeholder="Postal / Zip Code" required>
                        </div>
                    </div>
                </div>
            </fieldset>

            <fieldset class="form-section">
                <div class="section-header">
                    <div class="section-header-icon"><i class="fa-solid fa-calendar-alt"></i></div>
                    <h3>Timeline & Budget</h3>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label>Project Start Date <span class="required">*</span></label>
                        <input type="date" name="start_date" class="form-control" required>
                        <span class="sub-label">MM-DD-YYYY</span>
                    </div>

                    <div class="form-group">
                        <label>Estimated Completion Date <span class="required">*</span></label>
                        <input type="date" name="completion_date" class="form-control" required>
                        <span class="sub-label">MM-DD-YYYY</span>
                    </div>
                </div>

                <div class="form-group full-width">
                    <label>Project Budget (Rs) <span class="required">*</span></label>
                    <input type="number" name="project_budget" class="form-control" min="0" placeholder="e.g., 250000" required>
                </div>

                <div class="form-group full-width">
                    <label>Project Description <span class="required">*</span></label>
                    <textarea name="project_description" class="form-control" placeholder="Provide a detailed scope of the construction work required..." required></textarea>
                </div>
            </fieldset>

            <fieldset class="form-section">
                <div class="section-header">
                    <div class="section-header-icon"><i class="fa-solid fa-user-tie"></i></div>
                    <h3>Contact Information</h3>
                </div>

                <div class="form-group full-width">
                    <label>Contact Person Name <span class="required">*</span></label>
                    <div class="form-grid">
                        <div>
                            <input type="text" name="first_name" class="form-control" placeholder="First Name" required>
                        </div>
                        <div>
                            <input type="text" name="last_name" class="form-control" placeholder="Last Name" required>
                        </div>
                    </div>
                </div>

                <div class="form-group full-width">
                    <label>Contact Phone Number <span class="required">*</span></label>
                    <input type="tel" name="phone_number" class="form-control" placeholder="" required>
                </div>
            </fieldset>

            <div class="mb-8">
                <button type="submit" id="submitBtn" class="btn-primary">
                    <i class="fa-solid fa-paper-plane mr-2"></i> 
                    <span id="submitBtnText">Submit Project Details</span>
                </button>
            </div>
        </form>
    </main>

    <div id="toast" class="toast">
        <i id="toastIcon" class="fa-solid fa-check-circle text-brandGreen text-xl"></i>
        <span id="toastMessage" class="text-sm font-medium text-gray-700">Processing...</span>
    </div>

    <script>
        const API_BASE = window.location.origin;

        document.addEventListener('DOMContentLoaded', () => {
            loadMyProjects();
        });

        // Load my projects
        async function loadMyProjects() {
            const token = getAuthToken();
            try {
                const res = await fetch(`${API_BASE}/api/construction/my-projects`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                if (data.success && data.projects.length > 0) {
                    document.getElementById('myProjectsSection').style.display = 'block';
                    const list = document.getElementById('projectsList');
                    list.innerHTML = data.projects.map(p => `
                        <div class="project-card">
                            <div class="flex justify-between items-start mb-2">
                                <div>
                                    <h4>${p.project_name}</h4>
                                    <span class="req-id-badge">${p.req_id}</span>
                                    <span class="status-badge status-${p.status}">${p.status.replace('_', ' ')}</span>
                                </div>
                                <div class="text-sm text-gray-500">
                                    Rs ${parseFloat(p.project_budget).toLocaleString()}
                                </div>
                            </div>
                            <p class="text-sm text-gray-600">${p.address_line1}, ${p.city}</p>
                            <p class="text-sm text-gray-500 mt-1">
                                <i class="fa-solid fa-calendar mr-1"></i> ${new Date(p.start_date).toLocaleDateString()} - ${new Date(p.completion_date).toLocaleDateString()}
                            </p>
                        </div>
                    `).join('');
                }
            } catch (err) {
                console.log('No projects or not logged in');
            }
        }

        // Form submit
        async function handleFormSubmit(event) {
            event.preventDefault();
            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerHTML;
            const token = getAuthToken();

            if (!document.getElementById('constructionForm').checkValidity()) {
                document.getElementById('constructionForm').reportValidity();
                return;
            }

            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-2"></i> Submitting...`;
            btn.disabled = true;
            showLoading(true);

            const formData = new FormData(document.getElementById('constructionForm'));
            const data = Object.fromEntries(formData.entries());
            const reqId = document.getElementById('editReqId').value;

            try {
                let url = `${API_BASE}/api/construction/register`;
                let method = 'POST';

                if (reqId) {
                    url = `${API_BASE}/api/construction/project/${reqId}`;
                    method = 'PUT';
                }

                const res = await fetch(url, {
                    method: method,
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await res.json();

                if (result.success) {
                    showToast(`Project ${reqId ? 'updated' : 'registered'}! Request ID: ${result.reqId}`, 'success');
                    setTimeout(() => window.location.reload(), 2000);
                } else {
                    showToast(result.message || 'Failed', 'error');
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            } catch (error) {
                showToast('Network error', 'error');
                btn.innerHTML = originalText;
                btn.disabled = false;
            } finally {
                showLoading(false);
            }
        }

        function getAuthToken() {
            return localStorage.getItem('token') || 
                   localStorage.getItem('authToken') || 
                   sessionStorage.getItem('token') ||
                   sessionStorage.getItem('authToken') ||
                   '';
        }

        function showLoading(show) {
            const overlay = document.getElementById('loadingOverlay');
            if (show) overlay.classList.add('show');
            else overlay.classList.remove('show');
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            const toastIcon = document.getElementById('toastIcon');

            toastMessage.textContent = message;

            if (type === 'error') {
                toast.classList.add('error');
                toastIcon.className = 'fa-solid fa-circle-xmark text-red-600 text-xl';
            } else {
                toast.classList.remove('error');
                toastIcon.className = 'fa-solid fa-check-circle text-brandGreen text-xl';
            }

            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 4000);
        }
    </script>
</body>
</html>
