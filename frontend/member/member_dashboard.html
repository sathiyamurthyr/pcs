<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Dashboard | Pooja Catering Service</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandGreen: '#2c5f2d',
                        brandGreenLight: '#3d7a3e',
                        brandGreenDark: '#1a331e',
                        brandGold: '#bfa15f',
                        brandSoft: '#fffaf0',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif']
                    }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f7f5; }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #2c5f2d 0%, #1a331e 100%);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 1000;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            flex-shrink: 0;
        }

        .sidebar-header h2 {
            color: white;
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 700;
            line-height: 1.3;
        }

        .sidebar-header p {
            color: #bfa15f;
            font-size: 11px;
            font-weight: 500;
            margin-top: 4px;
            letter-spacing: 0.5px;
        }

        .sidebar-menu {
            flex: 1;
            padding: 16px 12px;
            overflow-y: auto;
            overflow-x: hidden;
            min-height: 0;
        }
        .sidebar-menu::-webkit-scrollbar { width: 4px; }
        .sidebar-menu::-webkit-scrollbar-track { background: transparent; }
        .sidebar-menu::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 14px;
            margin-bottom: 2px;
            border-radius: 10px;
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.25s ease;
            cursor: pointer;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
        }

        .sidebar-item:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .sidebar-item.active {
            background: rgba(255,255,255,0.18);
            color: white;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
        }

        .sidebar-item.active .sidebar-icon {
            color: #bfa15f;
        }

        .sidebar-icon {
            font-size: 18px;
            width: 24px;
            text-align: center;
            transition: all 0.3s;
        }

        /* Member Info Card */
        .member-info-card {
            margin: 8px 12px 12px 12px;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            flex-shrink: 0;
        }

        .member-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #bfa15f, #8b6914);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 6px;
        }

        .member-avatar span {
            color: white;
            font-size: 20px;
            font-weight: 700;
        }

        .member-name {
            color: white;
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 2px;
        }

        .member-id {
            color: #bfa15f;
            font-size: 10px;
            text-align: center;
            margin-bottom: 8px;
            word-break: break-all;
        }

        .logout-btn-sidebar {
            width: 100%;
            padding: 8px;
            background: #dc2626;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.3s;
        }

        .logout-btn-sidebar:hover {
            background: #b91c1c;
            transform: translateY(-2px);
        }

        /* Main Content */
        .main-content {
            margin-left: 280px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top Bar */
        .top-bar {
            background: white;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e8ede8;
            position: sticky;
            top: 0;
            z-index: 100;
            height: 70px;
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            color: #1a331e;
        }

        .page-subtitle {
            font-size: 13px;
            color: #888;
            margin-top: 2px;
        }

        /* Iframe Container */
        .iframe-wrapper {
            flex: 1;
            padding: 0;
            background: #f5f7f5;
            overflow: hidden;
        }

        .iframe-container {
            width: 100%;
            height: calc(100vh - 70px);
            background: white;
            overflow: hidden;
        }

        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Dashboard Home Content */
        .dashboard-home {
            padding: 24px 32px;
            max-width: 1200px;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            border: 1px solid #eef2ee;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(44,95,45,0.08);
        }

        .stat-label {
            font-size: 13px;
            font-weight: 600;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 800;
            color: #1a331e;
            font-family: 'Playfair Display', serif;
        }

        .stat-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: 12px;
        }

        .stat-icon.green { background: #f0f7f0; color: #2c5f2d; }
        .stat-icon.gold { background: #fffaf0; color: #bfa15f; }
        .stat-icon.dark { background: #1a331e; color: white; }

        /* Quick Access */
        .quick-access {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            border: 1px solid #eef2ee;
            margin-bottom: 28px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: #1a331e;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }
        @media (max-width: 768px) {
            .services-grid { grid-template-columns: repeat(2, 1fr); }
        }

        .service-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 20px 12px;
            border-radius: 16px;
            background: #f8faf8;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .service-item:hover {
            border-color: #2c5f2d;
            background: #f0f7f0;
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(44,95,45,0.1);
        }

        .service-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .service-name {
            font-size: 12px;
            font-weight: 600;
            color: #444;
            text-align: center;
        }

        /* Mobile */
        @media (max-width: 1024px) {
            .sidebar { width: 240px; }
            .main-content { margin-left: 240px; }
            .services-grid { grid-template-columns: repeat(3, 1fr); }
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                width: 280px;
            }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .services-grid { grid-template-columns: repeat(2, 1fr); }
            .stats-grid { grid-template-columns: 1fr; }
            .top-bar { padding: 12px 16px; }
            .dashboard-home { padding: 16px; }
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }

        .sidebar-overlay.active { display: block; }

        /* Gallery Layout - Two columns side by side, each image vertical */
        .gallery-vertical {
            display: flex !important;
            flex-direction: row !important;
            gap: 20px;
            width: 100%;
        }
        .gallery-item {
            flex: 1;
            text-align: center;
            display: flex !important;
            flex-direction: column;
            align-items: center;
        }
        .gallery-img {
            width: 100% !important;
            height: auto !important;
            max-height: 70vh;
            object-fit: contain !important;
            border-radius: 12px;
            border: 2px solid #e8ede8;
            display: block;
        }
        @media (max-width: 768px) {
            .gallery-vertical {
                flex-direction: column !important;
            }
        }
    </style>
<base target="_blank">
</head>
<body>

<!-- Sidebar Overlay (Mobile) -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-header" style="padding: 16px 20px;">
        <img src="../../uploads/logo/logo.jpeg" onerror="this.src='./uploads/logo/logo.jpeg';this.onerror=function(){this.style.display='none';}" alt="Pooja Catering Logo" style="width: 100%; max-width: 200px; height: auto; border-radius: 8px; margin-bottom: 8px;">
        <p style="color: #bfa15f; font-size: 11px; font-weight: 500; letter-spacing: 0.5px;">ISO 9001-2015 Certified | Since 1995</p>
    </div>

    <nav class="sidebar-menu">
        <button class="sidebar-item active" onclick="loadService('dashboard', this)">
            <span class="sidebar-icon">📊</span>
            <span>Dashboard</span>
        </button>
        <button class="sidebar-item" onclick="loadService('catering', this)">
            <span class="sidebar-icon">🍽️</span>
            <span>Catering Service</span>
        </button>
        <button class="sidebar-item" onclick="loadService('astrology', this)">
            <span class="sidebar-icon">🔮</span>
            <span>Astrology Service</span>
        </button>
        <button class="sidebar-item" onclick="loadService('wedding', this)">
            <span class="sidebar-icon">💒</span>
            <span>Wedding Events</span>
        </button>
        <button class="sidebar-item" onclick="loadService('matrimony', this)">
            <span class="sidebar-icon">💑</span>
            <span>Matrimony</span>
        </button>
        <button class="sidebar-item" onclick="loadService('temple', this)">
            <span class="sidebar-icon">🛕</span>
            <span>Temple Services</span>
        </button>
        <button class="sidebar-item" onclick="loadService('construction', this)">
            <span class="sidebar-icon">🏗️</span>
            <span>Constructions</span>
        </button>
        <button class="sidebar-item" onclick="loadService('bookings', this)">
            <span class="sidebar-icon">📅</span>
            <span>My Bookings</span>
        </button>
        <button class="sidebar-item" onclick="loadService('profile', this)">
            <span class="sidebar-icon">👤</span>
            <span>Profile</span>
        </button>
    </nav>

    <!-- Member Info Card -->
    <div class="member-info-card">
        <div class="member-avatar">
            <span id="memberAvatar">JD</span>
        </div>
        <div class="member-name" id="memberName">John Doe</div>
        <div class="member-id" id="memberId">PJA0001</div>
        <button class="logout-btn-sidebar" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> Logout
        </button>
    </div>
</aside>

<!-- Main Content -->
<div class="main-content">
    <!-- Top Bar -->
    <div class="top-bar">
        <div>
            <div class="page-title" id="pageTitle">Dashboard</div>
            <div class="page-subtitle" id="pageSubtitle">Welcome back, here's your overview</div>
        </div>
        <div class="top-actions">
            <button style="background:#f0f7f0; width:40px; height:40px; border-radius:50%; border:none; color:#2c5f2d; cursor:pointer;" onclick="toggleSidebar()">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
    </div>

    <!-- Content Area -->
    <div class="iframe-wrapper">
        <!-- Dashboard Home View -->
        <div id="dashboardView" class="dashboard-home">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon green"><i class="fa-solid fa-calendar-check"></i></div>
                    <div class="stat-label">Active Bookings</div>
                    <div class="stat-value" id="activeBookings">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon gold"><i class="fa-solid fa-calendar-days"></i></div>
                    <div class="stat-label">Total Events</div>
                    <div class="stat-value" id="totalEvents">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon dark"><i class="fa-solid fa-hourglass-half"></i></div>
                    <div class="stat-label">Upcoming Events</div>
                    <div class="stat-value" id="upcomingEvents">0</div>
                </div>
            </div>

            <!-- Admin Photos Gallery -->
            <div class="quick-access">
                <div class="section-title">
                    <i class="fa-solid fa-images" style="color: #bfa15f;"></i>
                    Gallery
                </div>
                <div class="gallery-vertical">
                    <div class="gallery-item">
                        <img src="../../uploads/memberdashboard/adm-1.jpeg" onerror="this.src='./uploads/memberdashboard/adm-1.jpeg';this.onerror=function(){this.style.display='none';}" alt="Admin Photo 1" class="gallery-img">
                    </div>
                    <div class="gallery-item">
                        <img src="../../uploads/memberdashboard/adm-2.jpeg" onerror="this.src='./uploads/memberdashboard/adm-2.jpeg';this.onerror=function(){this.style.display='none';}" alt="Admin Photo 2" class="gallery-img">
                    </div>
                </div>
            </div>
        </div>

        <!-- Iframe View (hidden by default, shown when service clicked) -->
        <div id="iframeView" class="iframe-container" style="display: none;">
            <iframe id="serviceFrame" src=""></iframe>
        </div>
    </div>
</div>

<script>
    // ===== PAGE MAPPING =====
    // Maps each menu item to its HTML file
    const pageSources = {
        'dashboard': null,              // Dashboard uses home view (no iframe)
        'catering': 'catering-menu.html',
        'astrology': 'astrology_service.html',
        'wedding': 'wedding.html',
        'matrimony': 'matrimony.html',
        'temple': 'temple.html',
        'construction': 'construction.html',
        'bookings': 'bookings.html',
        'profile': 'profile.html'
    };

    const pageTitles = {
        'dashboard': { title: 'Dashboard', subtitle: "Welcome back, here's your overview" },
        'catering': { title: 'Catering Service', subtitle: 'Explore our pure vegetarian catering packages' },
        'astrology': { title: 'Astrology Service', subtitle: 'Horoscope matching, Jathagam analysis & consultations' },
        'wedding': { title: 'Wedding Events', subtitle: 'Plan your dream wedding with us' },
        'matrimony': { title: 'Matrimony Service', subtitle: 'Find your perfect life partner' },
        'temple': { title: 'Temple Services', subtitle: 'Temple bookings and special darshan' },
        'construction': { title: 'Constructions', subtitle: 'Building and renovation services' },
        'bookings': { title: 'My Bookings', subtitle: 'Track and manage your bookings' },
        'profile': { title: 'My Profile', subtitle: 'Manage your account settings' }
    };

    // ===== LOAD SERVICE =====
    function loadService(page, element) {
        const info = pageTitles[page] || { title: 'Dashboard', subtitle: '' };

        // Update page title
        document.getElementById('pageTitle').textContent = info.title;
        document.getElementById('pageSubtitle').textContent = info.subtitle;

        // Update sidebar active state
        document.querySelectorAll('.sidebar-item').forEach(item => {
            item.classList.remove('active');
        });

        if (element) {
            element.classList.add('active');
        } else {
            // Find sidebar item by page
            const items = document.querySelectorAll('.sidebar-item');
            items.forEach(item => {
                if (item.getAttribute('onclick') && item.getAttribute('onclick').includes(`'${page}'`)) {
                    item.classList.add('active');
                }
            });
        }

        // Show dashboard or iframe
        const dashboardView = document.getElementById('dashboardView');
        const iframeView = document.getElementById('iframeView');
        const serviceFrame = document.getElementById('serviceFrame');

        if (page === 'dashboard') {
            // Show dashboard home, hide iframe
            dashboardView.style.display = 'block';
            iframeView.style.display = 'none';
            serviceFrame.src = '';
        } else {
            // Hide dashboard, show iframe with service page
            dashboardView.style.display = 'none';
            iframeView.style.display = 'block';

            const src = pageSources[page];
            if (src) {
                serviceFrame.src = src;
                console.log('Loading:', page, '→', src);
            }
        }

        // Save current page
        localStorage.setItem('memberCurrentPage', page);

        // Close mobile sidebar
        if (window.innerWidth <= 768) {
            toggleSidebar();
        }
    }

    // ===== MOBILE SIDEBAR =====
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        sidebar.classList.toggle('open');
        overlay.classList.toggle('active');
    }

    // ===== AUTH & MEMBER INFO =====
    function getMemberData() {
        const memberStr = sessionStorage.getItem('loggedInMember');
        if (!memberStr) {
            // For testing without login, return dummy data
            return {
                fullName: 'John Doe',
                name: 'John Doe',
                memberId: 'PJA0001',
                mobile: '9876543210',
                email: 'john@example.com',
                address: 'Chennai, Tamil Nadu'
            };
        }
        return JSON.parse(memberStr);
    }

    function loadMemberInfo() {
        const member = getMemberData();
        if (member) {
            const initial = member.fullName ? member.fullName.charAt(0).toUpperCase() : 'M';
            document.getElementById('memberAvatar').innerText = initial;
            document.getElementById('memberName').innerText = member.fullName || member.name || 'Member';
            document.getElementById('memberId').innerText = member.memberId || 'Pending';
        }
    }

    function loadDashboardStats() {
        const appointments = JSON.parse(localStorage.getItem('poojaAppointments') || '[]');
        const member = getMemberData();

        if (member) {
            const memberAppointments = appointments.filter(a => a.mobile === member.mobile);
            const activeBookings = memberAppointments.filter(a => a.status === 'pending' || a.status === 'confirmed').length;
            const totalEvents = memberAppointments.length;
            const upcomingEvents = memberAppointments.filter(a => new Date(a.preferredDate) > new Date()).length;

            document.getElementById('activeBookings').innerText = activeBookings;
            document.getElementById('totalEvents').innerText = totalEvents;
            document.getElementById('upcomingEvents').innerText = upcomingEvents;
        }
    }

    function logout() {
        sessionStorage.removeItem('loggedInMember');
        window.location.href = '../index.html';
    }

    // ===== INIT =====
    function init() {
        loadMemberInfo();
        loadDashboardStats();

        // Load last visited page
        const lastPage = localStorage.getItem('memberCurrentPage') || 'dashboard';

        // Find the sidebar item for lastPage and activate it
        const items = document.querySelectorAll('.sidebar-item');
        let activeItem = null;
        items.forEach(item => {
            if (item.getAttribute('onclick') && item.getAttribute('onclick').includes(`'${lastPage}'`)) {
                activeItem = item;
            }
        });

        loadService(lastPage, activeItem);
    }

    window.addEventListener('resize', () => {
        if (window.innerWidth > 768) {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('active');
        }
    });

    // Start
    init();
</script>

</body>
</html>
