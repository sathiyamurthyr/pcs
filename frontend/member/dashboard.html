<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Dashboard | Pooja Catering Service</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f7f5; }

        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #2c5f2d 0%, #1a331e 100%);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 1000;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            flex-shrink: 0;
        }

        .sidebar-header h2 {
            color: white;
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 700;
            line-height: 1.3;
        }

        .sidebar-header p {
            color: #bfa15f;
            font-size: 11px;
            font-weight: 500;
            margin-top: 4px;
            letter-spacing: 0.5px;
        }

        .sidebar-menu {
            flex: 1;
            padding: 16px 12px;
            overflow-y: auto;
            overflow-x: hidden;
            min-height: 0;
        }
        .sidebar-menu::-webkit-scrollbar { width: 4px; }
        .sidebar-menu::-webkit-scrollbar-track { background: transparent; }
        .sidebar-menu::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 14px;
            margin-bottom: 2px;
            border-radius: 10px;
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.25s ease;
            cursor: pointer;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
        }

        .sidebar-item:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .sidebar-item.active {
            background: rgba(255,255,255,0.18);
            color: white;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
        }

        .sidebar-item.active .sidebar-icon {
            color: #bfa15f;
        }

        .sidebar-icon {
            font-size: 18px;
            width: 24px;
            text-align: center;
            transition: all 0.3s;
        }

        .member-info-card {
            margin: 8px 12px 12px 12px;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            flex-shrink: 0;
        }

        .member-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #bfa15f, #8b6914);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 6px;
        }

        .member-avatar span {
            color: white;
            font-size: 20px;
            font-weight: 700;
        }

        .member-name {
            color: white;
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 2px;
        }

        .member-id {
            color: #bfa15f;
            font-size: 10px;
            text-align: center;
            margin-bottom: 8px;
            word-break: break-all;
        }

        .logout-btn-sidebar {
            width: 100%;
            padding: 8px;
            background: #dc2626;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.3s;
        }

        .logout-btn-sidebar:hover {
            background: #b91c1c;
            transform: translateY(-2px);
        }

        .main-content {
            margin-left: 280px;
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        .top-bar {
            background: white;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e8ede8;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            color: #1a331e;
        }

        .page-subtitle {
            font-size: 13px;
            color: #888;
            margin-top: 2px;
        }

        .top-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .dashboard-content {
            padding: 24px 32px;
        }

        .section-content {
            display: none;
            animation: fadeIn 0.35s ease;
        }

        .section-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .iframe-container {
            width: 100%;
            height: calc(100vh - 120px);
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }

        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            border: 1px solid #eef2ee;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(44,95,45,0.08);
        }

        .stat-label {
            font-size: 13px;
            font-weight: 600;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 800;
            color: #1a331e;
            font-family: 'Playfair Display', serif;
        }

        .stat-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: 12px;
        }

        .stat-icon.green { background: #f0f7f0; color: #2c5f2d; }
        .stat-icon.gold { background: #fffaf0; color: #bfa15f; }
        .stat-icon.dark { background: #1a331e; color: white; }

        .quick-access {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            border: 1px solid #eef2ee;
            margin-bottom: 28px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: #1a331e;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }
        @media (max-width: 768px) {
            .services-grid { grid-template-columns: repeat(2, 1fr); }
        }

        .service-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 20px 12px;
            border-radius: 16px;
            background: #f8faf8;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .service-item:hover {
            border-color: #2c5f2d;
            background: #f0f7f0;
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(44,95,45,0.1);
        }

        .service-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .service-name {
            font-size: 12px;
            font-weight: 600;
            color: #444;
            text-align: center;
        }

        .coming-soon {
            background: white;
            border-radius: 20px;
            padding: 80px 40px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            border: 1px solid #eef2ee;
        }

        .coming-soon-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        @media (max-width: 1024px) {
            .sidebar { width: 240px; }
            .main-content { margin-left: 240px; }
            .services-grid { grid-template-columns: repeat(3, 1fr); }
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                width: 280px;
            }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .services-grid { grid-template-columns: repeat(2, 1fr); }
            .stats-grid { grid-template-columns: 1fr; }
            .top-bar { padding: 12px 16px; }
            .dashboard-content { padding: 16px; }
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }

        .sidebar-overlay.active { display: block; }

        /* Gallery Layout - Two columns side by side, each image vertical */
        .gallery-vertical {
            display: flex !important;
            flex-direction: row !important;
            gap: 20px;
            width: 100%;
        }
        .gallery-item {
            flex: 1;
            text-align: center;
            display: flex !important;
            flex-direction: column;
            align-items: center;
        }
        .gallery-img {
            width: 100% !important;
            height: auto !important;
            max-height: 70vh;
            object-fit: contain !important;
            border-radius: 12px;
            border: 2px solid #e8ede8;
            display: block;
        }
        @media (max-width: 768px) {
            .gallery-vertical {
                flex-direction: column !important;
            }
        }
    </style>
<base target="_blank">
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-header" style="padding: 16px 20px;">
        <img src="../../uploads/logo/logo.jpeg" onerror="this.src='./uploads/logo/logo.jpeg';this.onerror=function(){this.style.display='none';}" alt="Pooja Catering Logo" style="width: 100%; max-width: 200px; height: auto; border-radius: 8px; margin-bottom: 8px;">
        <p style="color: #bfa15f; font-size: 11px; font-weight: 500; letter-spacing: 0.5px;">ISO 9001-2015 Certified | Since 1995</p>
    </div>

    <nav class="sidebar-menu">
        <button class="sidebar-item active" onclick="showSection('dashboard', this)">
            <span class="sidebar-icon">📊</span>
            <span>Dashboard</span>
        </button>
        <button class="sidebar-item" onclick="showSection('catering', this)">
            <span class="sidebar-icon">🍽️</span>
            <span>Catering Service</span>
        </button>
        <button class="sidebar-item" onclick="showSection('astrology', this)">
            <span class="sidebar-icon">🔮</span>
            <span>Astrology Service</span>
        </button>
        <button class="sidebar-item" onclick="showSection('wedding', this)">
            <span class="sidebar-icon">💒</span>
            <span>Wedding Events</span>
        </button>
        <button class="sidebar-item" onclick="showSection('matrimony', this)">
            <span class="sidebar-icon">💑</span>
            <span>Matrimony</span>
        </button>
        <button class="sidebar-item" onclick="showSection('temple', this)">
            <span class="sidebar-icon">🛕</span>
            <span>Temple Services</span>
        </button>
        <button class="sidebar-item" onclick="showSection('construction', this)">
            <span class="sidebar-icon">🏗️</span>
            <span>Constructions</span>
        </button>
        <button class="sidebar-item" onclick="showSection('bookings', this)">
            <span class="sidebar-icon">📅</span>
            <span>My Bookings</span>
        </button>
        <button class="sidebar-item" onclick="showSection('profile', this)">
            <span class="sidebar-icon">👤</span>
            <span>Profile</span>
        </button>
    </nav>

    <div class="member-info-card">
        <div class="member-avatar">
            <span id="memberAvatar">JD</span>
        </div>
        <div class="member-name" id="memberName">John Doe</div>
        <div class="member-id" id="memberId">PJA0001</div>
        <button class="logout-btn-sidebar" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> Logout
        </button>
    </div>
</aside>

<div class="main-content">
    <div class="top-bar">
        <div>
            <div class="page-title" id="pageTitle">Dashboard</div>
            <div class="page-subtitle" id="pageSubtitle">Welcome back, here's your overview</div>
        </div>
        <div class="top-actions">
            <button class="notification-btn" style="background:#f0f7f0; width:40px; height:40px; border-radius:50%; border:none;" onclick="toggleSidebar()">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
    </div>

    <div class="dashboard-content">
        <!-- DASHBOARD SECTION -->
        <div class="section-content active" id="dashboardSection">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon green"><i class="fa-solid fa-calendar-check"></i></div>
                    <div class="stat-label">Active Bookings</div>
                    <div class="stat-value" id="activeBookings">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon gold"><i class="fa-solid fa-calendar-days"></i></div>
                    <div class="stat-label">Total Events</div>
                    <div class="stat-value" id="totalEvents">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon dark"><i class="fa-solid fa-hourglass-half"></i></div>
                    <div class="stat-label">Upcoming Events</div>
                    <div class="stat-value" id="upcomingEvents">0</div>
                </div>
            </div>

            <!-- Admin Photos -->
            <div class="quick-access">
                <div class="section-title">
                    <i class="fa-solid fa-images" style="color: #bfa15f;"></i>
                    Gallery
                </div>
                <div class="gallery-vertical">
                    <div class="gallery-item">
                        <img src="../../uploads/memberdashboard/adm-1.jpeg" onerror="this.src='./uploads/memberdashboard/adm-1.jpeg';this.onerror=function(){this.style.display='none';}" alt="Admin Photo 1" class="gallery-img">
                    </div>
                    <div class="gallery-item">
                        <img src="../../uploads/memberdashboard/adm-2.jpeg" onerror="this.src='./uploads/memberdashboard/adm-2.jpeg';this.onerror=function(){this.style.display='none';}" alt="Admin Photo 2" class="gallery-img">
                    </div>
                </div>
            </div>
        </div>

        <!-- CATERING SECTION (Loads catering-menu.html from same folder) -->
        <div class="section-content" id="cateringSection">
            <div class="iframe-container">
                <iframe id="cateringFrame" src="catering-menu.html"></iframe>
            </div>
        </div>

        <!-- ASTROLOGY SECTION -->
        <div class="section-content" id="astrologySection">
            <div class="iframe-container">
                <iframe id="astrologyFrame" src="astrology_service.html"></iframe>
            </div>
        </div>

        <!-- WEDDING SECTION -->
        <div class="section-content" id="weddingSection">
            <div class="iframe-container">
                <iframe id="weddingFrame" src="wedding.html"></iframe>
            </div>
        </div>

        <!-- MATRIMONY SECTION -->
        <div class="section-content" id="matrimonySection">
            <div class="iframe-container">
                <iframe id="matrimonyFrame" src="matrimony.html"></iframe>
            </div>
        </div>

        <!-- TEMPLE SECTION -->
       <div class="section-content" id="templeSection">
            <div class="iframe-container">
                <iframe id="matrimonyFrame" src="templeseva.html"></iframe>
            </div>
        </div>
        

        <!-- CONSTRUCTION SECTION -->
        <div class="section-content" id="constructionSection">
            <div class="iframe-container">
                <iframe id="matrimonyFrame" src="construction.html"></iframe>
            </div>
        </div>

        <!-- BOOKINGS SECTION -->
        <div class="section-content" id="bookingsSection">
            <div class="coming-soon">
                <div class="coming-soon-icon">📅</div>
                <h3 class="text-2xl font-bold text-brandGreen mb-2">My Bookings</h3>
                <p class="text-gray-500">Track and manage all your service bookings.</p>
            </div>
        </div>

        <!-- PROFILE SECTION -->
        <div class="section-content" id="profileSection">
            <div class="quick-access">
                <div class="section-title">
                    <i class="fa-solid fa-user"></i>
                    My Profile
                </div>
                <div style="max-width: 500px; margin: 0 auto;">
                    <p class="py-2 border-b"><strong>Name:</strong> <span id="profileName">-</span></p>
                    <p class="py-2 border-b"><strong>Member ID:</strong> <span id="profileMemberId">-</span></p>
                    <p class="py-2 border-b"><strong>Mobile:</strong> <span id="profileMobile">-</span></p>
                    <p class="py-2 border-b"><strong>Email:</strong> <span id="profileEmail">-</span></p>
                    <p class="py-2"><strong>Address:</strong> <span id="profileAddress">-</span></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const sectionTitles = {
        'dashboard': { title: 'Dashboard', subtitle: 'Welcome back, here\'s your overview' },
        'catering': { title: 'Catering Service', subtitle: 'Explore our pure vegetarian catering packages' },
        'astrology': { title: 'Astrology Services', subtitle: 'Horoscope and astrological consultations' },
        'wedding': { title: 'Wedding Events', subtitle: 'Plan your dream wedding with us' },
        'matrimony': { title: 'Matrimony', subtitle: 'Find your perfect life partner' },
        'temple': { title: 'Temple Services', subtitle: 'Temple bookings and special darshan' },
        'construction': { title: 'Constructions', subtitle: 'Building and renovation services' },
        'bookings': { title: 'My Bookings', subtitle: 'Track and manage your bookings' },
        'profile': { title: 'My Profile', subtitle: 'Manage your account settings' }
    };

    function getMemberData() {
        const memberStr = sessionStorage.getItem('loggedInMember');
        if (!memberStr) {
            window.location.href = '../login.html';
            return null;
        }
        return JSON.parse(memberStr);
    }

    function loadMemberInfo() {
        const member = getMemberData();
        if (member) {
            const initial = member.fullName ? member.fullName.charAt(0).toUpperCase() : 'M';
            document.getElementById('memberAvatar').innerText = initial;
            document.getElementById('memberName').innerText = member.fullName || member.name;
            document.getElementById('memberId').innerText = member.memberId || 'Pending';
            
            document.getElementById('profileName').innerText = member.fullName || member.name;
            document.getElementById('profileMemberId').innerText = member.memberId || 'Pending';
            document.getElementById('profileMobile').innerText = member.mobile;
            document.getElementById('profileEmail').innerText = member.email || 'Not provided';
            document.getElementById('profileAddress').innerText = member.address || 'Not provided';
        }
    }

    function showSection(section, element, fromQuickAccess = false) {
        document.querySelectorAll('.section-content').forEach(sec => {
            sec.classList.remove('active');
        });

        const targetSection = document.getElementById(section + 'Section');
        if (targetSection) {
            targetSection.classList.add('active');
            
            // Refresh iframes when switching sections
            if (section === 'catering') {
                const iframe = document.getElementById('cateringFrame');
                if (iframe) iframe.src = 'catering-menu.html';
            }
            if (section === 'astrology') {
                const iframe = document.getElementById('astrologyFrame');
                if (iframe) iframe.src = 'astrology_service.html';
            }
            if (section === 'wedding') {
                const iframe = document.getElementById('weddingFrame');
                if (iframe) iframe.src = 'wedding.html';
            }
            if (section === 'matrimony') {
                const iframe = document.getElementById('matrimonyFrame');
                if (iframe) iframe.src = 'matrimony.html';
            }
        }

        const info = sectionTitles[section] || { title: 'Dashboard', subtitle: '' };
        document.getElementById('pageTitle').textContent = info.title;
        document.getElementById('pageSubtitle').textContent = info.subtitle;

        if (element) {
            document.querySelectorAll('.sidebar-item').forEach(item => {
                item.classList.remove('active');
            });
            element.classList.add('active');
        } else if (fromQuickAccess) {
            const sidebarItems = document.querySelectorAll('.sidebar-item');
            sidebarItems.forEach(item => {
                item.classList.remove('active');
                if (item.getAttribute('onclick') && item.getAttribute('onclick').includes("'" + section + "'")) {
                    item.classList.add('active');
                }
            });
        }

        if (window.innerWidth <= 768) {
            toggleSidebar();
        }
    }

    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        sidebar.classList.toggle('open');
        overlay.classList.toggle('active');
    }

    function logout() {
        sessionStorage.removeItem('loggedInMember');
        window.location.href = '../index.html';
    }

    function loadDashboardStats() {
        const appointments = JSON.parse(localStorage.getItem('poojaAppointments') || '[]');
        const member = getMemberData();
        
        if (member) {
            const memberAppointments = appointments.filter(a => a.mobile === member.mobile);
            const activeBookings = memberAppointments.filter(a => a.status === 'pending' || a.status === 'confirmed').length;
            const totalEvents = memberAppointments.length;
            const upcomingEvents = memberAppointments.filter(a => new Date(a.preferredDate) > new Date()).length;
            
            document.getElementById('activeBookings').innerText = activeBookings;
            document.getElementById('totalEvents').innerText = totalEvents;
            document.getElementById('upcomingEvents').innerText = upcomingEvents;
        }
    }

    function checkMobile() {
        if (window.innerWidth > 768) {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('active');
        }
    }

    window.addEventListener('resize', checkMobile);
    
    loadMemberInfo();
    loadDashboardStats();
    checkMobile();
</script>

</body>
</html>
