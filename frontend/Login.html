<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Login | Pooja Catering</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="min-h-screen flex items-center justify-center">
        <div class="bg-white rounded-2xl shadow-xl p-8 max-w-md w-full">
            <div class="text-center mb-6">
                <i class="fa-solid fa-leaf text-5xl text-green-700"></i>
                <h2 class="text-2xl font-bold text-gray-800 mt-2">Member Login</h2>
                <p class="text-gray-500 text-sm">Login with your mobile number and password</p>
            </div>
            
            <form id="loginForm" onsubmit="handleMemberLogin(event)">
                <div class="mb-4">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fas fa-phone"></i> Mobile Number
                    </label>
                    <input type="tel" id="mobile" required pattern="[0-9]{10}" maxlength="10" 
                           placeholder="10-digit mobile number" 
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:border-green-600">
                </div>
                
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <input type="password" id="password" required 
                           placeholder="Enter your password" 
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:border-green-600">
                </div>
                
                <button type="submit" class="w-full bg-green-700 text-white py-3 rounded-xl font-semibold hover:bg-green-800 transition">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>
            
            <p class="text-center text-sm text-gray-500 mt-4">
                Don't have an account? <a href="register.html" class="text-green-700 font-semibold">Register here</a>
            </p>
        </div>
    </div>

    <div id="toast" class="fixed bottom-4 right-4 hidden bg-gray-800 text-white px-4 py-2 rounded-lg shadow-lg z-50"></div>

    <script>
     const API_URL = window.location.origin + '/api';
        
        function showToast(message, type = 'error') {
            const toast = document.getElementById('toast');
            toast.className = `fixed bottom-4 right-4 px-4 py-2 rounded-lg shadow-lg z-50 ${type === 'success' ? 'bg-green-600' : 'bg-red-600'} text-white`;
            toast.innerHTML = message;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }
        
        async function handleMemberLogin(event) {
            event.preventDefault();
            
            const mobile = document.getElementById('mobile').value.trim();
            const password = document.getElementById('password').value;
            const btn = event.target.querySelector('button[type="submit"]');
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
            btn.disabled = true;
            
            try {
                const response = await fetch(`${API_URL}/members/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    const memberData = {
                        memberId: data.member.member_id,  // e.g., "PJA004"
                        id: data.member.id,               // e.g., 4
                        fullName: data.member.name,
                        mobile: data.member.mobile,
                        email: data.member.email,
                        address: data.member.address
                    };

                    // Store member data for dashboard
                    sessionStorage.setItem('loggedInMember', JSON.stringify(memberData));

                    // Generate and store Base64 token for API calls
                    const tokenString = memberData.id + ':' + memberData.memberId;  // "4:PJA004"
                    const base64Token = btoa(tokenString);  // "NDpQSkEwMDQ="
                    localStorage.setItem('token', base64Token);  // <-- THIS WAS MISSING! Now corrected
                    
                    showToast('Login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = 'member/dashboard.html';
                    }, 1000);
                } else {
                    showToast(data.message || 'Login failed');
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                    btn.disabled = false;
                }
            } catch (error) {
                console.error('Login error:', error);
                showToast('Server error. Please try again.');
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
