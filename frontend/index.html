<!-- login.html - Simple test version -->
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body { font-family: Arial; padding: 50px; text-align: center; }
        input { padding: 10px; margin: 10px; width: 250px; }
        button { padding: 10px 30px; background: #2c5f2d; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Member Login</h2>
    <form id="loginForm">
        <div><input type="text" id="mobile" placeholder="Mobile Number" required></div>
        <div><input type="password" id="password" placeholder="Password" required></div>
        <button type="submit">Login</button>
    </form>
    <p><a href="register.html">New user? Register here</a></p>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const mobile = document.getElementById('mobile').value;
            const password = document.getElementById('password').value;
            
            const response = await fetch('/api/members/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mobile, password })
            });
            
            const data = await response.json();
            
            if (data.success) {
                localStorage.setItem('memberToken', data.token);
                localStorage.setItem('memberData', JSON.stringify(data.member));
                window.parent.postMessage({ type: 'memberLoginSuccess' }, '*');
            } else {
                alert(data.message);
            }
        });
    </script>
</body>
</html>
